<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IPS Brasil 2026 — Mapa de Indicadores</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1eb;
  --surface: #ffffff;
  --border: #e2ddd4;
  --text: #181614;
  --muted: #7a7268;
  --accent: #c93a0e;
  --green: #1a6b3c;
  --blue: #1644a8;
  --yellow: #f0c000;
  --panel: 340px;
  --hdr: 52px;
  --r: 10px;
  /* Escala de cor universal: azul(baixo) → branco → vermelho(alto) */
  --c-low: #2166ac;
  --c-mid: #f5f5f0;
  --c-high: #b2182b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:14px;}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hdr);
  background:var(--text);color:#fff;z-index:1000;
  display:flex;align-items:center;padding:0 14px;gap:10px;
  box-shadow:0 1px 0 rgba(255,255,255,0.06);
}
#hdr-logo{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:-0.02em;flex:1;}
#hdr-logo span{color:var(--yellow);}
.hdr-btn{
  background:none;border:1.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);
  border-radius:6px;padding:4px 10px;font-size:0.72rem;font-family:'Syne',sans-serif;
  font-weight:700;cursor:pointer;letter-spacing:0.03em;transition:all .15s;white-space:nowrap;
}
.hdr-btn:hover,.hdr-btn.on{background:rgba(255,255,255,0.12);color:#fff;}
#btn-panel{display:none;}

/* LAYOUT */
#app{display:flex;height:100vh;padding-top:var(--hdr);position:relative;}

/* PAINEL LATERAL */
#panel{
  width:var(--panel);min-width:var(--panel);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  z-index:200;transition:transform .28s cubic-bezier(.4,0,.2,1);
}

/* TABS */
#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{
  flex:1;padding:11px 4px;text-align:center;background:none;
  border:none;border-bottom:2.5px solid transparent;
  font-family:'Syne',sans-serif;font-size:0.68rem;font-weight:700;
  letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;
  color:var(--muted);transition:all .14s;
}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* SCROLL AREA */
.scroll{flex:1;overflow-y:auto;padding:14px;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* SECTION LABEL */
.slabel{
  font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);
  margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border);
}
.slabel:first-child{margin-top:0;}

/* CATEGORY CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.chip{
  padding:4px 10px;border-radius:20px;font-size:0.68rem;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;
  border:1.5px solid;transition:all .13s;white-space:nowrap;
}

/* INDICATOR LIST */
.ind-item{
  display:flex;align-items:flex-start;gap:8px;padding:7px 8px;
  border-radius:7px;cursor:pointer;font-size:0.76rem;line-height:1.35;
  transition:background .1s;border:1.5px solid transparent;
}
.ind-item:hover{background:var(--bg);}
.ind-item.on{background:#fff5f3;border-color:#f5cdc5;color:var(--accent);}
.ind-name{flex:1;}
.ind-unit{font-size:0.63rem;color:var(--muted);margin-top:1px;}
.ind-dir{font-size:0.6rem;font-family:'Syne',sans-serif;font-weight:700;opacity:.6;}

/* LEGENDA — sempre visível no fundo do painel */
#legenda{
  flex-shrink:0;padding:10px 14px 12px;
  border-top:1px solid var(--border);background:var(--surface);
}
#leg-ind{font-size:0.8rem;font-weight:600;margin-bottom:2px;color:var(--text);}
#leg-desc{font-size:0.67rem;color:var(--muted);line-height:1.4;margin-bottom:7px;}
#leg-bar{
  height:10px;border-radius:4px;margin-bottom:4px;
  background:linear-gradient(to right, var(--c-low), var(--c-mid), var(--c-high));
}
#leg-labels{display:flex;justify-content:space-between;font-size:0.66rem;color:var(--muted);}
#leg-note{
  margin-top:6px;font-size:0.63rem;color:var(--muted);line-height:1.4;
  padding:5px 7px;background:var(--bg);border-radius:5px;
}

/* BUSCA */
#srch-wrap{position:relative;margin-bottom:10px;}
#srch-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;}
#srch{
  width:100%;padding:8px 10px 8px 30px;border:1.5px solid var(--border);
  border-radius:7px;font-size:0.8rem;font-family:inherit;
  background:var(--bg);outline:none;transition:border-color .14s;
}
#srch:focus{border-color:var(--accent);background:#fff;}
.sr{
  padding:7px 9px;border-radius:6px;cursor:pointer;
  font-size:0.78rem;display:flex;justify-content:space-between;align-items:center;
  transition:background .1s;
}
.sr:hover{background:var(--bg);}
.sr-uf{font-size:0.66rem;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;}

/* FICHA */
#ficha-back{
  display:none;align-items:center;gap:5px;padding:6px 0 10px;
  font-size:0.75rem;color:var(--muted);cursor:pointer;
  background:none;border:none;font-family:inherit;
}
#ficha-back:hover{color:var(--accent);}
#ficha-hdr{
  padding:14px;background:var(--text);color:#fff;
  border-radius:var(--r);margin-bottom:10px;
}
#ficha-nome{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;}
#ficha-sub{font-size:0.73rem;color:rgba(255,255,255,.55);margin-top:2px;}
#ficha-ips{display:flex;align-items:baseline;gap:6px;margin-top:10px;}
#ficha-ips-v{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--yellow);}
#ficha-ips-l{font-size:0.7rem;color:rgba(255,255,255,.5);line-height:1.4;}
.fgrp{margin-bottom:14px;}
.fgrp-t{
  font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  padding:7px 0 5px;border-bottom:1px solid var(--border);margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.fgrp-dot{width:7px;height:7px;border-radius:50%;}
.find{
  display:flex;align-items:center;padding:5px 0;
  border-bottom:1px solid #f0ece6;gap:8px;
}
.find:last-child{border:none;}
.find-info{flex:1;min-width:0;}
.find-n{font-size:0.73rem;font-weight:500;line-height:1.3;}
.find-s{font-size:0.63rem;color:var(--muted);margin-top:1px;}
.find-bar-wrap{height:3px;background:#f0ece6;border-radius:2px;margin-top:3px;}
.find-bar{height:100%;border-radius:2px;transition:width .3s;}
.find-v{font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700;text-align:right;flex-shrink:0;}
.find-u{font-size:0.58rem;color:var(--muted);display:block;}

/* RANKINGS */
.rk-sel{
  width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;
  font-size:0.76rem;font-family:inherit;background:var(--bg);outline:none;
  margin-bottom:8px;cursor:pointer;
}
.toggle-g{display:flex;gap:4px;margin-bottom:10px;}
.tog{
  padding:5px 12px;border-radius:6px;font-size:0.7rem;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;
  border:1.5px solid var(--border);background:var(--bg);color:var(--muted);transition:all .13s;
}
.tog.on{background:var(--text);color:#fff;border-color:var(--text);}
.rk-item{
  display:flex;align-items:center;gap:7px;padding:6px 7px;
  border-radius:7px;cursor:pointer;transition:background .1s;font-size:0.76rem;
}
.rk-item:hover{background:var(--bg);}
.rk-pos{font-family:'Syne',sans-serif;font-weight:800;font-size:0.66rem;color:var(--muted);width:16px;flex-shrink:0;}
.rk-nm{flex:1;font-weight:500;}
.rk-uf{font-size:0.62rem;color:var(--muted);}
.rk-v{font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;}

/* MAPA */
#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{position:absolute;inset:0;}

/* TOOLTIP */
.mtt{
  background:var(--text) !important;color:#fff !important;
  border:none !important;border-radius:8px !important;
  padding:8px 11px !important;font-family:'DM Sans',sans-serif !important;
  font-size:0.75rem !important;box-shadow:0 4px 20px rgba(0,0,0,.25) !important;
  pointer-events:none !important;min-width:120px;
}
.mtt-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:0.8rem;}
.mtt-v{color:var(--yellow);font-weight:600;margin-top:3px;}
.mtt-ind{color:rgba(255,255,255,.45);font-size:0.67rem;margin-top:2px;}

/* LOADING */
#loading{
  position:fixed;inset:0;background:var(--text);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#loading-logo{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--yellow);}
#loading-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;}
#loading-msg{font-size:0.8rem;color:rgba(255,255,255,.4);}
#loading-track{width:220px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
#loading-fill{height:100%;background:var(--yellow);border-radius:2px;width:0;transition:width .3s;}

/* MOBILE */
@media(max-width:768px){
  #btn-panel{display:block;}
  #panel{
    position:fixed;top:var(--hdr);left:0;bottom:0;
    transform:translateX(-100%);
    box-shadow:4px 0 24px rgba(0,0,0,.15);
    width:min(var(--panel),93vw);
  }
  #panel.open{transform:translateX(0);}
}
body.desktop #panel{position:relative;transform:none !important;}
body.desktop #btn-panel{display:none;}
</style>
</head>
<body>

<div id="loading">
  <div id="loading-logo">IPS</div>
  <div id="loading-title">Brasil 2026</div>
  <div id="loading-msg">Carregando dados…</div>
  <div id="loading-track"><div id="loading-fill"></div></div>
</div>

<div id="hdr">
  <div id="hdr-logo">IPS <span>Brasil</span> 2026</div>
  <button class="hdr-btn" id="btn-panel" onclick="togglePanel()">☰ Painel</button>
  <button class="hdr-btn" id="btn-desktop" onclick="toggleDesktop()">🖥 Desktop</button>
</div>

<div id="app">
  <!-- PAINEL -->
  <div id="panel">
    <div id="tabs">
      <button class="tab on" onclick="showTab('mapa',this)">🗺 Mapa</button>
      <button class="tab" onclick="showTab('explorar',this)">🔍 Explorar</button>
      <button class="tab" onclick="showTab('rankings',this)">🏆 Rankings</button>
    </div>

    <!-- TAB MAPA -->
    <div id="tab-mapa" class="scroll">
      <div class="slabel">Categoria</div>
      <div class="chips" id="mapa-chips"></div>
      <div class="slabel">Indicador visualizado</div>
      <div id="ind-list"></div>
    </div>

    <!-- TAB EXPLORAR -->
    <div id="tab-explorar" class="scroll" style="display:none;">
      <button id="ficha-back" onclick="backSearch()">← voltar à busca</button>
      <div id="srch-sec">
        <div class="slabel">Buscar município</div>
        <div id="srch-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="srch" placeholder="Nome do município…" oninput="searchMun(this.value)" autocomplete="off"/>
        </div>
        <div id="srch-res"></div>
      </div>
      <div id="ficha"></div>
    </div>

    <!-- TAB RANKINGS -->
    <div id="tab-rankings" class="scroll" style="display:none;">
      <div class="slabel">Categoria</div>
      <div class="chips" id="rank-chips"></div>
      <div class="toggle-g">
        <button class="tog on" id="tog-top" onclick="setDir('top')">↑ Maiores</button>
        <button class="tog" id="tog-bot" onclick="setDir('bot')">↓ Menores</button>
      </div>
      <select class="rk-sel" id="rk-sel" onchange="rankInd=this.value;buildRank()"></select>
      <div class="slabel">Top 10 municípios</div>
      <div id="rk-mun"></div>
      <div class="slabel" style="margin-top:14px;">Por estado (média)</div>
      <div id="rk-est"></div>
    </div>

    <!-- LEGENDA — sempre visível -->
    <div id="legenda">
      <div id="leg-ind">—</div>
      <div id="leg-desc"></div>
      <div id="leg-bar"></div>
      <div id="leg-labels">
        <span id="leg-lo">Menor valor</span>
        <span id="leg-md"></span>
        <span id="leg-hi">Maior valor</span>
      </div>
      <div id="leg-note"></div>
    </div>
  </div>

  <!-- MAPA -->
  <div id="map-wrap"><div id="map"></div></div>
</div>

<script>
// ─── DADOS ───────────────────────────────────────────────────────────────────
let D=null, GEO=null;
let geoLayer=null, leaflet=null;
let IND='Índice de Progresso Social';
let rankInd='Índice de Progresso Social';
let rankDir='top';
let munIdx={};
let tabAtiva='mapa';
let catMapa='Geral', catRank='Geral';

const CORES={
  'Geral':'#1644a8','Saúde':'#c93a0e','Segurança':'#7a1515',
  'Educação':'#1a6b3c','Infraestrutura':'#6b3fa0',
  'Meio Ambiente':'#0f7a3c','Social':'#b86b00','Justiça':'#4a4040'
};

const GRUPOS={
  'Geral':['Índice de Progresso Social','Necessidades Humanas Básicas','Fundamentos do Bem-estar','Oportunidades','POPULAÇÃO 2025','PIB PER CAPITA','ÁREA km²'],
  'Saúde':['Expectativa de Vida ','Mortalidade Infantil até 5 anos','Mortalidade entre 15 e 50 anos','Mortalidades por Doenças Crônicas Não Transmissíveis ','Obesidade','Suicídios','Subnutrição','Cobertura Vacinal (poliomielite)','Hospitalizações por Condições Sensíveis à Atenção Primária','Mortalidade Ajustada por Condições Sensíveis à Atenção Primária','Consumo de ultraprocessados','Nutrição e Cuidados Médicos Básicos','Saúde e Bem-estar'],
  'Segurança':['Homicídios','Assassinatos de Jovens','Assassinatos de Mulheres','Mortes por Acidentes de Transporte','Violência Contra Mulheres','Violência Contra Negros','Violência Contra Indígenas','Famílias em Situação de Rua','Segurança Pessoal'],
  'Educação':['Ideb Ensino Fundamental','Nota Mediana no Enem','Abandono no Ensino Fundamental','Abandono no Ensino Médio','Evasão no Ensino Médio','Distorção Idade-Série no Ensino Médio','Reprovação Escolar no Ensino Médio','Acesso ao Conhecimento Básico','Acesso à Educação Superior','Empregados com Ensino Superior','Mulheres Empregadas com Ensino Superior'],
  'Infraestrutura':['Água e Saneamento','Abastecimento de Água Via Rede de Distribuição','Esgotamento Sanitário Adequado','Índice de Abastecimento de Água','Índice de Perdas de Água na Distribuição','Domicílios com Coleta de Resíduos Adequada','Domicílios com Iluminação Elétrica Adequada','Domicílios com Paredes Adequadas','Domicílios com Pisos Adequados','Moradia','Cobertura de Internet Móvel (4G/5G)','Densidade de Internet Banda Larga Fixa','Densidade Telefonia Móvel','Qualidade de Internet Móvel','Acesso à Informação e Comunicação'],
  'Meio Ambiente':['Emissões de CO₂e por Habitante','Focos de Calor','Áreas Verdes Urbanas','Praças e Parques em Áreas Urbanas','Supressão da Vegetação Primária e Secundária','Qualidade do Meio Ambiente','Índice de Vulnerabilidade Climática dos Municípios (IVCM)'],
  'Social':['Inclusão Social','Gravidez na Adolescência (<19)','Índice de Vulnerabilidade das Famílias do CadÚnico (IVCAD)','Paridade de Gênero na Câmara Municipal','Paridade de Negros na Câmara Municipal','Liberdades Individuais e de Escolha','Acesso à Cultura, Lazer e Esporte','Acesso a Programas de Direitos Humanos','Existência de Ações para Direitos de Minorias'],
  'Justiça':['Direitos Individuais','Índice de Atendimento à Demanda de Justiça','Resposta a Processos Previdenciários','Resposta a Processos Familiares','Taxa de Congestionamento Líquida de Processos']
};

// ─── COR — UNIVERSAL: azul=menor, vermelho=maior, SEMPRE ─────────────────────
// A legenda explica o que maior/menor significa para cada indicador
function escala(ind){
  const vs=D.municipios.map(m=>m.i[ind]).filter(v=>v!=null).sort((a,b)=>a-b);
  if(!vs.length) return {p5:0,p95:1,mid:0.5};
  return {
    p5: vs[Math.floor(vs.length*.05)],
    p95: vs[Math.floor(vs.length*.95)],
    mid: vs[Math.floor(vs.length*.5)]
  };
}

function cor(v, esc){
  // azul(0) → branco(0.5) → vermelho(1), sempre
  const t=Math.max(0,Math.min(1,(v-esc.p5)/(esc.p95-esc.p5+.001)));
  if(t<.5){
    const f=t*2;
    // azul escuro → branco
    return `rgb(${lp(33,245,f)},${lp(102,245,f)},${lp(172,245,f)})`;
  } else {
    const f=(t-.5)*2;
    // branco → vermelho escuro
    return `rgb(${lp(245,178,f)},${lp(245,24,f)},${lp(245,43,f)})`;
  }
}
function lp(a,b,t){return Math.round(a+(b-a)*t);}

// ─── CARREGAMENTO ────────────────────────────────────────────────────────────
async function boot(){
  prog('Carregando dados IPS…',15);
  try{ const r=await fetch('conhece_brasil_v1.json'); D=await r.json(); }
  catch(e){ setMsg('Erro: conhece_brasil_v1.json não encontrado.'); return; }

  prog('Carregando geometrias…',50);
  try{ const r=await fetch('municipios_geo.geojson'); GEO=await r.json(); }
  catch(e){ setMsg('Erro: municipios_geo.geojson não encontrado.'); return; }

  prog('Indexando…',80);
  for(const m of D.municipios) munIdx[nrm(m.m)+'_'+nrm(m.u)]=m;
  for(const f of GEO.features){
    const p=f.properties;
    p._k=nrm(p.NM_MUN||'')+'_'+nrm(p.SIGLA_UF||'');
    p._d=munIdx[p._k]||null;
  }

  prog('Iniciando…',95);
  await sleep(80);
  initUI();
  prog('',100);
  await sleep(250);
  document.getElementById('loading').style.display='none';
}

function prog(msg,pct){
  document.getElementById('loading-msg').textContent=msg;
  document.getElementById('loading-fill').style.width=pct+'%';
}
function setMsg(m){document.getElementById('loading-msg').textContent=m;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function nrm(s){return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();}

// ─── INIT UI ─────────────────────────────────────────────────────────────────
function initUI(){
  initMapa();
  buildMapaChips();
  buildIndList();
  buildRankChips();
  buildRank();
  atualizarMapa();
}

// ─── MAPA ────────────────────────────────────────────────────────────────────
function initMapa(){
  leaflet=L.map('map',{zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leaflet);
  L.control.zoom({position:'bottomright'}).addTo(leaflet);
  leaflet.setView([-14,-52],4);
}

function atualizarMapa(){
  if(geoLayer){leaflet.removeLayer(geoLayer);geoLayer=null;}
  const ind=IND;
  const meta=D.meta[ind];
  const esc=escala(ind);

  geoLayer=L.geoJSON(GEO,{
    style:f=>{
      const d=f.properties._d;
      const v=d?d.i[ind]:null;
      if(v==null) return {fillColor:'#d8d4cc',weight:.3,color:'#bbb',fillOpacity:.7};
      return {fillColor:cor(v,esc),weight:.3,color:'rgba(0,0,0,.12)',fillOpacity:.88};
    },
    onEachFeature:(f,layer)=>{
      const d=f.properties._d;
      const v=d?d.i[ind]:null;
      const nm=f.properties.NM_MUN||'';
      const uf=f.properties.SIGLA_UF||'';
      const un=meta?meta.unidade:'';
      layer.bindTooltip(()=>`
        <div class="mtt-nm">${nm} — ${uf}</div>
        <div class="mtt-v">${v!=null?fmt(v)+' <span style="opacity:.6;font-size:.7em">'+un+'</span>':'sem dado'}</div>
        <div class="mtt-ind">${meta?meta.nome:ind}</div>
      `,{className:'mtt',sticky:true,opacity:1});
      layer.on('click',()=>{if(d) abrirFicha(d);});
      layer.on('mouseover',e=>e.target.setStyle({weight:1.5,color:'#333'}));
      layer.on('mouseout',e=>geoLayer.resetStyle(e.target));
    }
  }).addTo(leaflet);

  atualizarLegenda(ind,esc,meta);
}

function atualizarLegenda(ind,esc,meta){
  const maiorMelhor=meta&&meta.maior==='melhor';
  const maiorPior=meta&&meta.maior==='pior';
  const un=meta?meta.unidade:'';

  document.getElementById('leg-ind').textContent=meta?meta.nome:ind;
  document.getElementById('leg-desc').textContent=meta?meta.simples:'';
  // Barra sempre: azul=menor, branco=médio, vermelho=maior
  document.getElementById('leg-bar').style.background=
    'linear-gradient(to right,#2166ac,#f5f5f0,#b2182b)';
  document.getElementById('leg-lo').textContent=fmt(esc.p5)+' '+un;
  document.getElementById('leg-md').textContent=fmt(esc.mid);
  document.getElementById('leg-hi').textContent=fmt(esc.p95)+' '+un;

  // Nota explicativa sobre o que cor significa para este indicador
  let nota='';
  if(maiorMelhor) nota='🔵 Azul = menor valor  ·  🔴 Vermelho = maior valor  ·  Para este indicador, MAIOR é MELHOR';
  else if(maiorPior) nota='🔵 Azul = menor valor  ·  🔴 Vermelho = maior valor  ·  Para este indicador, MAIOR é PIOR';
  else nota='🔵 Azul = menor valor  ·  🔴 Vermelho = maior valor';
  document.getElementById('leg-note').textContent=nota;
}

// ─── PAINEL MAPA ─────────────────────────────────────────────────────────────
function buildMapaChips(){
  chips('mapa-chips', catMapa, cat=>{catMapa=cat; buildMapaChips(); buildIndList();});
}

function buildIndList(){
  const wrap=document.getElementById('ind-list');
  wrap.innerHTML='';
  const inds=GRUPOS[catMapa]||[];
  for(const ind of inds){
    const meta=D.meta[ind];
    if(!meta) continue;
    const el=document.createElement('div');
    el.className='ind-item'+(ind===IND?' on':'');
    const dir=meta.maior==='melhor'?'↑ maior = melhor':meta.maior==='pior'?'↑ maior = pior':'—';
    el.innerHTML=`<div class="ind-name">${meta.nome}<div class="ind-unit">${meta.unidade} <span class="ind-dir">${dir}</span></div></div>`;
    el.onclick=()=>{IND=ind; buildIndList(); atualizarMapa();};
    wrap.appendChild(el);
  }
}

// ─── FICHA ────────────────────────────────────────────────────────────────────
function abrirFicha(m){
  showTab('explorar', document.querySelectorAll('.tab')[1]);
  document.getElementById('srch-sec').style.display='none';
  document.getElementById('ficha-back').style.display='flex';

  const ips=m.i['Índice de Progresso Social'];
  const pop=m.i['POPULAÇÃO 2025'];
  const pib=m.i['PIB PER CAPITA'];

  let html=`
    <div id="ficha-hdr">
      <div id="ficha-nome">${m.m}</div>
      <div id="ficha-sub">${m.u} · ${m.r}${pop?' · '+fmtPop(pop)+' hab.':''}${pib?' · PIB pc R$'+fmt(pib):''}</div>
      <div id="ficha-ips">
        <span id="ficha-ips-v">${ips!=null?ips.toFixed(1):'—'}</span>
        <span id="ficha-ips-l">IPS Brasil 2026<br>escala 0–100, maior = melhor</span>
      </div>
    </div>`;

  for(const [grp,inds] of Object.entries(GRUPOS)){
    const cor_=CORES[grp];
    const linhas=inds.map(ind=>{
      const meta=D.meta[ind]; const v=m.i[ind];
      if(!meta||v==null) return '';
      const esc=escala(ind);
      const pct=Math.max(0,Math.min(100,((v-esc.p5)/(esc.p95-esc.p5+.001))*100));
      // Barra: sempre azul(baixo)→vermelho(alto), igual ao mapa
      const corBar=cor(v,esc);
      return `<div class="find">
        <div class="find-info">
          <div class="find-n">${meta.nome}</div>
          <div class="find-s">${meta.simples}</div>
          <div class="find-bar-wrap"><div class="find-bar" style="width:${pct}%;background:${corBar}"></div></div>
        </div>
        <div class="find-v">${fmt(v)}<span class="find-u">${meta.unidade}</span></div>
      </div>`;
    }).filter(Boolean).join('');
    if(!linhas) continue;
    html+=`<div class="fgrp">
      <div class="fgrp-t"><span class="fgrp-dot" style="background:${cor_}"></span>${grp}</div>
      ${linhas}
    </div>`;
  }

  document.getElementById('ficha').innerHTML=html;
  if(m.lat&&m.lon) leaflet.setView([m.lat,m.lon],10,{animate:true});
  if(window.innerWidth<=768&&!document.body.classList.contains('desktop')) closePanel();
}

function backSearch(){
  document.getElementById('ficha').innerHTML='';
  document.getElementById('srch-sec').style.display='block';
  document.getElementById('ficha-back').style.display='none';
  document.getElementById('srch').value='';
  document.getElementById('srch-res').innerHTML='';
}

// ─── BUSCA ────────────────────────────────────────────────────────────────────
function searchMun(q){
  const res=document.getElementById('srch-res');
  if(!q||q.length<2){res.innerHTML='';return;}
  const qn=nrm(q);
  const found=D.municipios.filter(m=>nrm(m.m).includes(qn)||nrm(m.u).includes(qn)).slice(0,12);
  res.innerHTML=found.map(m=>`
    <div class="sr" onclick="abrirFicha(munIdx['${nrm(m.m)}_${nrm(m.u)}'])">
      <span>${m.m}</span><span class="sr-uf">${m.u}</span>
    </div>`).join('');
}

// ─── RANKINGS ────────────────────────────────────────────────────────────────
function buildRankChips(){
  chips('rank-chips', catRank, cat=>{
    catRank=cat;
    const inds=GRUPOS[cat]||[];
    rankInd=inds[0]||rankInd;
    buildRankChips(); buildRank();
  });
}

function setDir(d){
  rankDir=d;
  document.getElementById('tog-top').className='tog'+(d==='top'?' on':'');
  document.getElementById('tog-bot').className='tog'+(d==='bot'?' on':'');
  buildRank();
}

function buildRank(){
  const inds=GRUPOS[catRank]||[];
  if(!inds.includes(rankInd)) rankInd=inds[0];

  // Popula select
  const sel=document.getElementById('rk-sel');
  sel.innerHTML=inds.map(i=>`<option value="${i}" ${i===rankInd?'selected':''}>${D.meta[i]?D.meta[i].nome:i}</option>`).join('');

  // Top municípios
  let vs=D.municipios.map(m=>({m,v:m.i[rankInd]})).filter(x=>x.v!=null);
  vs.sort((a,b)=>rankDir==='top'?b.v-a.v:a.v-b.v);
  document.getElementById('rk-mun').innerHTML=vs.slice(0,10).map((x,i)=>`
    <div class="rk-item" onclick="abrirFicha(munIdx['${nrm(x.m.m)}_${nrm(x.m.u)}'])">
      <span class="rk-pos">${i+1}</span>
      <span class="rk-nm">${x.m.m} <span class="rk-uf">${x.m.u}</span></span>
      <span class="rk-v">${fmt(x.v)}</span>
    </div>`).join('');

  // Por estado
  const uf={};
  for(const m of D.municipios){const v=m.i[rankInd]; if(v!=null){if(!uf[m.u])uf[m.u]=[];uf[m.u].push(v);}}
  let estVs=Object.entries(uf).map(([u,arr])=>({u,v:arr.reduce((a,b)=>a+b,0)/arr.length}));
  estVs.sort((a,b)=>rankDir==='top'?b.v-a.v:a.v-b.v);
  document.getElementById('rk-est').innerHTML=estVs.slice(0,10).map((x,i)=>`
    <div class="rk-item">
      <span class="rk-pos">${i+1}</span>
      <span class="rk-nm">${x.u}</span>
      <span class="rk-v">${fmt(x.v)}</span>
    </div>`).join('');
}

// ─── HELPERS UI ───────────────────────────────────────────────────────────────
function chips(id, ativa, cb){
  const wrap=document.getElementById(id);
  wrap.innerHTML='';
  for(const [cat,cor_] of Object.entries(CORES)){
    const el=document.createElement('button');
    el.className='chip'+(cat===ativa?' active':'');
    el.textContent=cat;
    el.style.borderColor=cor_;
    el.style.color=cat===ativa?'#fff':cor_;
    el.style.background=cat===ativa?cor_:'transparent';
    el.onclick=()=>cb(cat);
    wrap.appendChild(el);
  }
}

function showTab(tab, btn){
  tabAtiva=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(btn) btn.classList.add('on');
  ['mapa','explorar','rankings'].forEach(t=>{
    const el=document.getElementById('tab-'+t);
    if(el) el.style.display=t===tab?'block':'none';
  });
  if(tab==='explorar'&&!document.getElementById('ficha').innerHTML){
    backSearch();
  }
  if(window.innerWidth<=768&&!document.body.classList.contains('desktop')) openPanel();
}

let panelOpen=false;
function togglePanel(){panelOpen=!panelOpen;document.getElementById('panel').classList.toggle('open',panelOpen);}
function openPanel(){panelOpen=true;document.getElementById('panel').classList.add('open');}
function closePanel(){panelOpen=false;document.getElementById('panel').classList.remove('open');}

function toggleDesktop(){
  document.body.classList.toggle('desktop');
  const on=document.body.classList.contains('desktop');
  document.getElementById('btn-desktop').classList.toggle('on',on);
  document.getElementById('btn-desktop').textContent=on?'📱 Mobile':'🖥 Desktop';
  setTimeout(()=>leaflet&&leaflet.invalidateSize(),350);
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────
function fmt(v){
  if(v==null) return '—';
  if(Math.abs(v)>=1e6) return (v/1e6).toFixed(1)+'M';
  if(Math.abs(v)>=1e3) return (v/1e3).toFixed(1)+'k';
  if(Math.abs(v)>=100) return Math.round(v).toLocaleString('pt-BR');
  return parseFloat(v.toFixed(2)).toString();
}
function fmtPop(v){
  if(v>=1e6) return (v/1e6).toFixed(1)+'M';
  if(v>=1e3) return (v/1e3).toFixed(0)+'k';
  return Math.round(v).toString();
}

boot();
