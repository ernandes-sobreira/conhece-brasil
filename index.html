<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IPS Brasil 2026 — Mapa de Indicadores</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f1eb; --surface:#fff; --border:#e2ddd4;
  --text:#181614; --muted:#7a7268; --accent:#c93a0e;
  --yellow:#f0c000;
  --panel:340px; --hdr:52px; --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);
  font-family:'DM Sans',sans-serif;color:var(--text);font-size:14px;}

/* HEADER */
#hdr{
  position:fixed;top:0;left:0;right:0;height:var(--hdr);
  background:var(--text);color:#fff;z-index:1000;
  display:flex;align-items:center;padding:0 14px;gap:8px;
}
#hdr-logo{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;
  letter-spacing:-.02em;flex:1;}
#hdr-logo span{color:var(--yellow);}
.hdr-btn{
  background:none;border:1.5px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.8);border-radius:6px;padding:4px 10px;
  font-size:.72rem;font-family:'Syne',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:.03em;transition:all .15s;white-space:nowrap;
}
.hdr-btn:hover,.hdr-btn.on{background:rgba(255,255,255,.12);color:#fff;}
#btn-panel{display:none;}

/* APP SHELL */
#app{display:flex;height:100vh;padding-top:var(--hdr);}

/* PAINEL — flex column, altura fixa */
#panel{
  width:var(--panel);min-width:var(--panel);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column; /* CRÍTICO: column com height definido */
  height:calc(100vh - var(--hdr));
  overflow:hidden;
  z-index:200;transition:transform .28s cubic-bezier(.4,0,.2,1);
}

/* TABS — altura fixa */
#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;height:40px;}
.tab{
  flex:1;height:100%;background:none;
  border:none;border-bottom:2.5px solid transparent;
  font-family:'Syne',sans-serif;font-size:.67rem;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;cursor:pointer;
  color:var(--muted);transition:all .14s;
}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* CONTEÚDO DA TAB — flex:1, overflow:hidden, flex column interno */
.tab-body{
  flex:1; /* pega o espaço entre tabs e legenda */
  overflow:hidden;
  display:flex;flex-direction:column;
}

/* ÁREA DE SCROLL dentro do tab-body */
.scroll-area{
  flex:1;
  overflow-y:scroll; /* sempre mostrar scrollbar */
  overflow-x:hidden;
  padding:14px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.scroll-area::-webkit-scrollbar{width:5px;}
.scroll-area::-webkit-scrollbar-track{background:transparent;}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.scroll-area::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* LEGENDA — altura fixa no fundo, nunca some */
#legenda{
  flex-shrink:0;
  padding:10px 14px 13px;
  border-top:1px solid var(--border);
  background:var(--surface);
  min-height:90px;
}
#leg-ind{font-size:.8rem;font-weight:600;margin-bottom:2px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#leg-desc{font-size:.66rem;color:var(--muted);line-height:1.4;margin-bottom:6px;}
#leg-bar{height:10px;border-radius:4px;margin-bottom:4px;
  background:linear-gradient(to right,#2166ac,#f5f5f0,#b2182b);}
#leg-labs{display:flex;justify-content:space-between;font-size:.64rem;color:var(--muted);gap:4px;}
#leg-labs span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:33%;}
#leg-note{margin-top:6px;font-size:.62rem;color:var(--muted);line-height:1.4;
  padding:5px 7px;background:var(--bg);border-radius:5px;}

/* SECTION LABEL */
.slabel{
  font-family:'Syne',sans-serif;font-size:.6rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border);
}
.slabel:first-child{margin-top:0;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.chip{
  padding:4px 10px;border-radius:20px;font-size:.67rem;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;
  border:1.5px solid;transition:all .13s;white-space:nowrap;
}

/* INDICADOR LISTA */
.ind-item{
  display:flex;align-items:flex-start;gap:8px;padding:7px 8px;
  border-radius:7px;cursor:pointer;font-size:.75rem;line-height:1.35;
  transition:background .1s;border:1.5px solid transparent;
}
.ind-item:hover{background:var(--bg);}
.ind-item.on{background:#fff5f3;border-color:#f5cdc5;color:var(--accent);}
.ind-name{flex:1;}
.ind-unit{font-size:.62rem;color:var(--muted);margin-top:1px;}
.ind-dir{font-size:.59rem;font-family:'Syne',sans-serif;font-weight:700;opacity:.6;}

/* BUSCA */
#srch-wrap{position:relative;margin-bottom:10px;}
#srch-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);
  opacity:.4;pointer-events:none;}
#srch{
  width:100%;padding:8px 10px 8px 30px;border:1.5px solid var(--border);
  border-radius:7px;font-size:.79rem;font-family:inherit;
  background:var(--bg);outline:none;transition:border-color .14s;
}
#srch:focus{border-color:var(--accent);background:#fff;}
.sr{
  padding:7px 9px;border-radius:6px;cursor:pointer;
  font-size:.77rem;display:flex;justify-content:space-between;align-items:center;
  transition:background .1s;
}
.sr:hover{background:var(--bg);}
.sr-uf{font-size:.65rem;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;}

/* FICHA */
#ficha-back{
  display:none;align-items:center;gap:5px;padding:6px 0 10px;
  font-size:.74rem;color:var(--muted);cursor:pointer;
  background:none;border:none;font-family:inherit;
}
#ficha-back:hover{color:var(--accent);}
#ficha-hdr{
  padding:14px;background:var(--text);color:#fff;
  border-radius:var(--r);margin-bottom:10px;
}
.f-nome{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;}
.f-sub{font-size:.72rem;color:rgba(255,255,255,.55);margin-top:2px;}
.f-ips{display:flex;align-items:baseline;gap:6px;margin-top:10px;}
.f-ips-v{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--yellow);}
.f-ips-l{font-size:.69rem;color:rgba(255,255,255,.5);line-height:1.4;}
.fgrp{margin-bottom:14px;}
.fgrp-t{
  font-family:'Syne',sans-serif;font-size:.59rem;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  padding:7px 0 5px;border-bottom:1px solid var(--border);margin-bottom:6px;
  display:flex;align-items:center;gap:5px;
}
.fgrp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.find{
  display:flex;align-items:center;padding:5px 0;
  border-bottom:1px solid #f0ece6;gap:8px;
}
.find:last-child{border:none;}
.find-info{flex:1;min-width:0;}
.find-n{font-size:.72rem;font-weight:500;line-height:1.3;}
.find-s{font-size:.62rem;color:var(--muted);margin-top:1px;}
.find-bar-wrap{height:3px;background:#ede9e2;border-radius:2px;margin-top:3px;}
.find-bar{height:100%;border-radius:2px;}
.find-v{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;
  text-align:right;flex-shrink:0;}
.find-u{font-size:.58rem;color:var(--muted);display:block;}

/* RANKINGS */
.rk-sel{
  width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;
  font-size:.75rem;font-family:inherit;background:var(--bg);outline:none;
  margin-bottom:8px;cursor:pointer;
}
.toggle-g{display:flex;gap:4px;margin-bottom:10px;}
.tog{
  padding:5px 12px;border-radius:6px;font-size:.69rem;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--muted);transition:all .13s;
}
.tog.on{background:var(--text);color:#fff;border-color:var(--text);}
.rk-item{
  display:flex;align-items:center;gap:7px;padding:6px 7px;
  border-radius:7px;cursor:pointer;transition:background .1s;font-size:.75rem;
}
.rk-item:hover{background:var(--bg);}
.rk-pos{font-family:'Syne',sans-serif;font-weight:800;font-size:.65rem;
  color:var(--muted);width:16px;flex-shrink:0;}
.rk-nm{flex:1;font-weight:500;}
.rk-uf{font-size:.61rem;color:var(--muted);}
.rk-v{font-family:'Syne',sans-serif;font-weight:700;font-size:.77rem;}

/* MAPA */
#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{position:absolute;inset:0;}

/* MUNICÍPIO SELECIONADO — destaque neutro, sem cor de indicador */
.mun-selecionado{
  fill:none !important;
  stroke:#1a1814 !important;
  stroke-width:2.5 !important;
  stroke-dasharray:none !important;
}
/* Marcador do município selecionado no mapa */
.marcador-sel{
  background:var(--text);color:#fff;
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:.72rem;padding:5px 10px;border-radius:20px;
  white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.25);
  border:2px solid var(--yellow);
}

/* TOOLTIP */
.mtt{
  background:var(--text) !important;color:#fff !important;
  border:none !important;border-radius:8px !important;
  padding:8px 11px !important;font-family:'DM Sans',sans-serif !important;
  font-size:.74rem !important;box-shadow:0 4px 20px rgba(0,0,0,.25) !important;
  pointer-events:none !important;min-width:120px;
}
.mtt-nm{font-family:'Syne',sans-serif;font-weight:800;font-size:.79rem;}
.mtt-v{color:var(--yellow);font-weight:600;margin-top:3px;}
.mtt-ind{color:rgba(255,255,255,.45);font-size:.66rem;margin-top:2px;}

/* LOADING */
#loading{
  position:fixed;inset:0;background:var(--text);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.ld-logo{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--yellow);}
.ld-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;}
.ld-msg{font-size:.8rem;color:rgba(255,255,255,.4);}
.ld-track{width:220px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:var(--yellow);border-radius:2px;width:0;transition:width .3s;}

/* MOBILE */
@media(max-width:768px){
  #btn-panel{display:block;}
  #panel{
    position:fixed;top:var(--hdr);left:0;bottom:0;
    transform:translateX(-100%);
    box-shadow:4px 0 24px rgba(0,0,0,.15);
    width:min(var(--panel),93vw);
  }
  #panel.open{transform:translateX(0);}
}
body.desktop #panel{position:relative;transform:none !important;}
body.desktop #btn-panel{display:none;}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-logo">IPS</div>
  <div class="ld-title">Brasil 2026</div>
  <div class="ld-msg" id="ld-msg">Carregando dados…</div>
  <div class="ld-track"><div class="ld-fill" id="ld-fill"></div></div>
</div>

<div id="hdr">
  <div id="hdr-logo">IPS <span>Brasil</span> 2026</div>
  <button class="hdr-btn" id="btn-panel" onclick="togglePanel()">☰ Painel</button>
  <button class="hdr-btn" id="btn-desktop" onclick="toggleDesktop()">🖥 Desktop</button>
</div>

<div id="app">
  <div id="panel">
    <div id="tabs">
      <button class="tab on" onclick="showTab('mapa',this)">🗺 Mapa</button>
      <button class="tab"    onclick="showTab('explorar',this)">🔍 Explorar</button>
      <button class="tab"    onclick="showTab('rankings',this)">🏆 Rankings</button>
    </div>

    <!-- TAB MAPA -->
    <div id="tab-mapa" class="tab-body">
      <div class="scroll-area">
        <div class="slabel">Categoria</div>
        <div class="chips" id="mapa-chips"></div>
        <div class="slabel">Indicador visualizado</div>
        <div id="ind-list"></div>
      </div>
    </div>

    <!-- TAB EXPLORAR -->
    <div id="tab-explorar" class="tab-body" style="display:none;">
      <div class="scroll-area">
        <button id="ficha-back" onclick="backSearch()">← voltar à busca</button>
        <div id="srch-sec">
          <div class="slabel">Buscar município</div>
          <div id="srch-wrap">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="srch" placeholder="Nome do município…"
              oninput="searchMun(this.value)" autocomplete="off"/>
          </div>
          <div id="srch-res"></div>
        </div>
        <div id="ficha"></div>
      </div>
    </div>

    <!-- TAB RANKINGS -->
    <div id="tab-rankings" class="tab-body" style="display:none;">
      <div class="scroll-area">
        <div class="slabel">Categoria</div>
        <div class="chips" id="rank-chips"></div>
        <div class="toggle-g">
          <button class="tog on" id="tog-top" onclick="setDir('top')">↑ Maiores</button>
          <button class="tog"    id="tog-bot" onclick="setDir('bot')">↓ Menores</button>
        </div>
        <select class="rk-sel" id="rk-sel" onchange="rankInd=this.value;buildRank()"></select>
        <div class="slabel">Top 10 municípios</div>
        <div id="rk-mun"></div>
        <div class="slabel" style="margin-top:14px;">Por estado (média)</div>
        <div id="rk-est"></div>
      </div>
    </div>

    <!-- LEGENDA — sempre visível, fora do scroll -->
    <div id="legenda">
      <div id="leg-ind">—</div>
      <div id="leg-desc"></div>
      <div id="leg-bar"></div>
      <div id="leg-labs">
        <span id="leg-lo"></span>
        <span id="leg-md"></span>
        <span id="leg-hi"></span>
      </div>
      <div id="leg-note"></div>
    </div>
  </div>

  <div id="map-wrap"><div id="map"></div></div>
</div>

<script>
// ─── ESTADO ───────────────────────────────────────────────────────────────────
let D=null,GEO=null;
let geoLayer=null,leaf=null;
let IND='Índice de Progresso Social';
let rankInd='Índice de Progresso Social';
let rankDir='top';
let munIdx={};
let munSel=null;        // município selecionado atualmente
let featureSel=null;    // layer do feature selecionado
let markerSel=null;     // marcador no mapa
let catMapa='Geral',catRank='Geral';

const CORES={
  'Geral':'#1644a8','Saúde':'#c93a0e','Segurança':'#7a1515',
  'Educação':'#1a6b3c','Infraestrutura':'#6b3fa0',
  'Meio Ambiente':'#0f7a3c','Social':'#b86b00','Justiça':'#4a4040'
};
const GRUPOS={
  'Geral':['Índice de Progresso Social','Necessidades Humanas Básicas',
    'Fundamentos do Bem-estar','Oportunidades','POPULAÇÃO 2025','PIB PER CAPITA','ÁREA km²'],
  'Saúde':['Expectativa de Vida ','Mortalidade Infantil até 5 anos',
    'Mortalidade entre 15 e 50 anos','Mortalidades por Doenças Crônicas Não Transmissíveis ',
    'Obesidade','Suicídios','Subnutrição','Cobertura Vacinal (poliomielite)',
    'Hospitalizações por Condições Sensíveis à Atenção Primária',
    'Mortalidade Ajustada por Condições Sensíveis à Atenção Primária',
    'Consumo de ultraprocessados','Nutrição e Cuidados Médicos Básicos','Saúde e Bem-estar'],
  'Segurança':['Homicídios','Assassinatos de Jovens','Assassinatos de Mulheres',
    'Mortes por Acidentes de Transporte','Violência Contra Mulheres',
    'Violência Contra Negros','Violência Contra Indígenas',
    'Famílias em Situação de Rua','Segurança Pessoal'],
  'Educação':['Ideb Ensino Fundamental','Nota Mediana no Enem',
    'Abandono no Ensino Fundamental','Abandono no Ensino Médio',
    'Evasão no Ensino Médio','Distorção Idade-Série no Ensino Médio',
    'Reprovação Escolar no Ensino Médio','Acesso ao Conhecimento Básico',
    'Acesso à Educação Superior','Empregados com Ensino Superior',
    'Mulheres Empregadas com Ensino Superior'],
  'Infraestrutura':['Água e Saneamento','Abastecimento de Água Via Rede de Distribuição',
    'Esgotamento Sanitário Adequado','Índice de Abastecimento de Água',
    'Índice de Perdas de Água na Distribuição','Domicílios com Coleta de Resíduos Adequada',
    'Domicílios com Iluminação Elétrica Adequada','Domicílios com Paredes Adequadas',
    'Domicílios com Pisos Adequados','Moradia','Cobertura de Internet Móvel (4G/5G)',
    'Densidade de Internet Banda Larga Fixa','Densidade Telefonia Móvel',
    'Qualidade de Internet Móvel','Acesso à Informação e Comunicação'],
  'Meio Ambiente':['Emissões de CO₂e por Habitante','Focos de Calor',
    'Áreas Verdes Urbanas','Praças e Parques em Áreas Urbanas',
    'Supressão da Vegetação Primária e Secundária','Qualidade do Meio Ambiente',
    'Índice de Vulnerabilidade Climática dos Municípios (IVCM)'],
  'Social':['Inclusão Social','Gravidez na Adolescência (<19)',
    'Índice de Vulnerabilidade das Famílias do CadÚnico (IVCAD)',
    'Paridade de Gênero na Câmara Municipal','Paridade de Negros na Câmara Municipal',
    'Liberdades Individuais e de Escolha','Acesso à Cultura, Lazer e Esporte',
    'Acesso a Programas de Direitos Humanos','Existência de Ações para Direitos de Minorias'],
  'Justiça':['Direitos Individuais','Índice de Atendimento à Demanda de Justiça',
    'Resposta a Processos Previdenciários','Resposta a Processos Familiares',
    'Taxa de Congestionamento Líquida de Processos']
};

// ─── CORES: azul=menor, vermelho=maior, SEMPRE ────────────────────────────────
function getEsc(ind){
  const vs=D.municipios.map(m=>m.i[ind]).filter(v=>v!=null).sort((a,b)=>a-b);
  if(!vs.length) return {p5:0,p95:1,mid:.5};
  return{
    p5:vs[Math.floor(vs.length*.05)],
    p95:vs[Math.floor(vs.length*.95)],
    mid:vs[Math.floor(vs.length*.5)]
  };
}
function getCor(v,esc){
  const t=Math.max(0,Math.min(1,(v-esc.p5)/(esc.p95-esc.p5+.001)));
  if(t<.5){const f=t*2; return`rgb(${lp(33,245,f)},${lp(102,245,f)},${lp(172,245,f)})`;}
  const f=(t-.5)*2; return`rgb(${lp(245,178,f)},${lp(245,24,f)},${lp(245,43,f)})`;
}
function lp(a,b,t){return Math.round(a+(b-a)*t);}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
async function boot(){
  prog('Carregando dados IPS…',15);
  try{const r=await fetch('conhece_brasil_v1.json');D=await r.json();}
  catch(e){setMsg('Erro: conhece_brasil_v1.json não encontrado.');return;}

  prog('Carregando geometrias…',50);
  try{const r=await fetch('municipios_geo.geojson');GEO=await r.json();}
  catch(e){setMsg('Erro: municipios_geo.geojson não encontrado.');return;}

  prog('Indexando…',80);
  for(const m of D.municipios) munIdx[nrm(m.m)+'_'+nrm(m.u)]=m;
  for(const f of GEO.features){
    const p=f.properties;
    p._k=nrm(p.NM_MUN||'')+'_'+nrm(p.SIGLA_UF||'');
    p._d=munIdx[p._k]||null;
  }
  prog('Iniciando…',95);
  await sleep(80);
  initUI();
  prog('',100);
  await sleep(250);
  document.getElementById('loading').style.display='none';
}
function prog(msg,pct){
  document.getElementById('ld-msg').textContent=msg;
  document.getElementById('ld-fill').style.width=pct+'%';
}
function setMsg(m){document.getElementById('ld-msg').textContent=m;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function nrm(s){return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initUI(){
  initMapa();
  buildChips('mapa-chips',catMapa,cat=>{catMapa=cat;buildChips('mapa-chips',catMapa,arguments.callee);buildIndList();});
  buildIndList();
  buildChips('rank-chips',catRank,cat=>{
    catRank=cat;
    const inds=GRUPOS[cat]||[];
    rankInd=inds[0]||rankInd;
    buildChips('rank-chips',catRank,arguments.callee);
    buildRank();
  });
  buildRank();
  atualizarMapa();
}

// ─── MAPA ─────────────────────────────────────────────────────────────────────
function initMapa(){
  leaf=L.map('map',{zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(leaf);
  L.control.zoom({position:'bottomright'}).addTo(leaf);
  leaf.setView([-14,-52],4);
}

function atualizarMapa(){
  if(geoLayer){leaf.removeLayer(geoLayer);geoLayer=null;}
  const ind=IND,meta=D.meta[ind],esc=getEsc(ind);

  geoLayer=L.geoJSON(GEO,{
    style:f=>{
      const d=f.properties._d,v=d?d.i[ind]:null;
      if(v==null) return{fillColor:'#d8d4cc',weight:.3,color:'#bbb',fillOpacity:.7};
      return{fillColor:getCor(v,esc),weight:.3,color:'rgba(0,0,0,.12)',fillOpacity:.88};
    },
    onEachFeature:(f,layer)=>{
      const d=f.properties._d,v=d?d.i[ind]:null;
      const nm=f.properties.NM_MUN||'',uf=f.properties.SIGLA_UF||'';
      const un=meta?meta.unidade:'';
      layer.bindTooltip(()=>`
        <div class="mtt-nm">${nm} — ${uf}</div>
        <div class="mtt-v">${v!=null?fmt(v)+' <span style="opacity:.6;font-size:.68em">'+un+'</span>':'sem dado'}</div>
        <div class="mtt-ind">${meta?meta.nome:ind}</div>
      `,{className:'mtt',sticky:true,opacity:1});

      layer.on('click',()=>{
        if(d) selecionarMun(d,layer);
      });
      layer.on('mouseover',e=>{
        if(e.target!==featureSel) e.target.setStyle({weight:1.5,color:'#333'});
      });
      layer.on('mouseout',e=>{
        if(e.target!==featureSel) geoLayer.resetStyle(e.target);
      });
    }
  }).addTo(leaf);

  // Reaplica destaque se tinha município selecionado
  if(munSel&&featureSel){
    destacarFeature(featureSel);
  }

  atualizarLegenda(ind,esc,meta);
}

function selecionarMun(m,layer){
  // Remove destaque anterior
  if(featureSel&&geoLayer){
    geoLayer.resetStyle(featureSel);
  }
  if(markerSel){leaf.removeLayer(markerSel);markerSel=null;}

  munSel=m;
  featureSel=layer;
  destacarFeature(layer);

  // Marcador com nome no mapa
  if(m.lat&&m.lon){
    const icon=L.divIcon({
      className:'',
      html:`<div class="marcador-sel">${m.m}</div>`,
      iconAnchor:[0,0]
    });
    markerSel=L.marker([m.lat,m.lon],{icon,zIndexOffset:1000}).addTo(leaf);
  }

  abrirFicha(m);
}

function destacarFeature(layer){
  // Borda preta espessa, sem alterar a cor de preenchimento do indicador
  layer.setStyle({weight:3,color:'#1a1814',fillOpacity:.88});
  layer.bringToFront();
}

function atualizarLegenda(ind,esc,meta){
  const un=meta?meta.unidade:'';
  const maior=meta?meta.maior:'';
  document.getElementById('leg-ind').textContent=meta?meta.nome:ind;
  document.getElementById('leg-desc').textContent=meta?meta.simples:'';
  document.getElementById('leg-bar').style.background=
    'linear-gradient(to right,#2166ac,#f5f5f0,#b2182b)';
  document.getElementById('leg-lo').textContent='← '+fmt(esc.p5)+' '+un;
  document.getElementById('leg-md').textContent=fmt(esc.mid);
  document.getElementById('leg-hi').textContent=fmt(esc.p95)+' '+un+' →';
  const nota=maior==='melhor'
    ?'🔵 Azul = menor valor  ·  🔴 Vermelho = maior valor  ·  Para este indicador MAIOR É MELHOR'
    :maior==='pior'
    ?'🔵 Azul = menor valor  ·  🔴 Vermelho = maior valor  ·  Para este indicador MAIOR É PIOR'
    :'🔵 Azul = menor valor  ·  🔴 Vermelho = maior valor';
  document.getElementById('leg-note').textContent=nota;
}

// ─── CHIPS ────────────────────────────────────────────────────────────────────
function buildChips(id,ativa,cb){
  const wrap=document.getElementById(id);
  wrap.innerHTML='';
  for(const[cat,cor]of Object.entries(CORES)){
    const el=document.createElement('button');
    el.className='chip';
    el.textContent=cat;
    el.style.borderColor=cor;
    if(cat===ativa){el.style.color='#fff';el.style.background=cor;}
    else{el.style.color=cor;el.style.background='transparent';}
    el.onclick=()=>cb(cat);
    wrap.appendChild(el);
  }
}

function buildIndList(){
  const wrap=document.getElementById('ind-list');
  wrap.innerHTML='';
  for(const ind of GRUPOS[catMapa]||[]){
    const meta=D.meta[ind];if(!meta) continue;
    const dir=meta.maior==='melhor'?'↑ maior = melhor':meta.maior==='pior'?'↑ maior = pior':'—';
    const el=document.createElement('div');
    el.className='ind-item'+(ind===IND?' on':'');
    el.innerHTML=`<div class="ind-name">${meta.nome}
      <div class="ind-unit">${meta.unidade} <span class="ind-dir">${dir}</span></div></div>`;
    el.onclick=()=>{IND=ind;buildIndList();atualizarMapa();};
    wrap.appendChild(el);
  }
}

// ─── FICHA ────────────────────────────────────────────────────────────────────
function abrirFicha(m){
  showTab('explorar',document.querySelectorAll('.tab')[1]);
  document.getElementById('srch-sec').style.display='none';
  document.getElementById('ficha-back').style.display='flex';

  const ips=m.i['Índice de Progresso Social'];
  const pop=m.i['POPULAÇÃO 2025'];
  const pib=m.i['PIB PER CAPITA'];

  let html=`<div id="ficha-hdr">
    <div class="f-nome">${m.m}</div>
    <div class="f-sub">${m.u} · ${m.r}${pop?' · '+fmtPop(pop)+' hab.':''}${pib?' · PIB pc R$'+fmt(pib):''}</div>
    <div class="f-ips">
      <span class="f-ips-v">${ips!=null?ips.toFixed(1):'—'}</span>
      <span class="f-ips-l">IPS Brasil 2026<br>escala 0–100, maior = melhor</span>
    </div>
  </div>`;

  for(const[grp,inds]of Object.entries(GRUPOS)){
    const corGrp=CORES[grp];
    const linhas=inds.map(ind=>{
      const meta=D.meta[ind],v=m.i[ind];
      if(!meta||v==null) return'';
      const esc=getEsc(ind);
      const pct=Math.max(0,Math.min(100,((v-esc.p5)/(esc.p95-esc.p5+.001))*100));
      const barCor=getCor(v,esc);
      return`<div class="find">
        <div class="find-info">
          <div class="find-n">${meta.nome}</div>
          <div class="find-s">${meta.simples}</div>
          <div class="find-bar-wrap"><div class="find-bar" style="width:${pct}%;background:${barCor}"></div></div>
        </div>
        <div class="find-v">${fmt(v)}<span class="find-u">${meta.unidade}</span></div>
      </div>`;
    }).filter(Boolean).join('');
    if(!linhas) continue;
    html+=`<div class="fgrp">
      <div class="fgrp-t"><span class="fgrp-dot" style="background:${corGrp}"></span>${grp}</div>
      ${linhas}
    </div>`;
  }

  document.getElementById('ficha').innerHTML=html;
  if(m.lat&&m.lon) leaf.setView([m.lat,m.lon],9,{animate:true});
  if(window.innerWidth<=768&&!document.body.classList.contains('desktop')) closePanel();
}

function backSearch(){
  document.getElementById('ficha').innerHTML='';
  document.getElementById('srch-sec').style.display='block';
  document.getElementById('ficha-back').style.display='none';
  document.getElementById('srch').value='';
  document.getElementById('srch-res').innerHTML='';
  // Remove seleção do mapa
  if(featureSel&&geoLayer){geoLayer.resetStyle(featureSel);featureSel=null;}
  if(markerSel){leaf.removeLayer(markerSel);markerSel=null;}
  munSel=null;
}

// ─── BUSCA ────────────────────────────────────────────────────────────────────
function searchMun(q){
  const res=document.getElementById('srch-res');
  if(!q||q.length<2){res.innerHTML='';return;}
  const qn=nrm(q);
  const found=D.municipios.filter(m=>nrm(m.m).includes(qn)||nrm(m.u).includes(qn)).slice(0,12);
  res.innerHTML=found.map(m=>`
    <div class="sr" onclick="selecionarPorChave('${nrm(m.m)}_${nrm(m.u)}')">
      <span>${m.m}</span><span class="sr-uf">${m.u}</span>
    </div>`).join('');
}

function selecionarPorChave(chave){
  const m=munIdx[chave];
  if(!m) return;
  // Procura o layer correspondente
  let layerAlvo=null;
  if(geoLayer){
    geoLayer.eachLayer(layer=>{
      if(layer.feature&&layer.feature.properties._k===chave) layerAlvo=layer;
    });
  }
  if(layerAlvo) selecionarMun(m,layerAlvo);
  else abrirFicha(m);
}

// ─── RANKINGS ─────────────────────────────────────────────────────────────────
function setDir(d){
  rankDir=d;
  document.getElementById('tog-top').className='tog'+(d==='top'?' on':'');
  document.getElementById('tog-bot').className='tog'+(d==='bot'?' on':'');
  buildRank();
}

function buildRank(){
  const inds=GRUPOS[catRank]||[];
  if(!inds.includes(rankInd)) rankInd=inds[0];
  const sel=document.getElementById('rk-sel');
  sel.innerHTML=inds.map(i=>`<option value="${i}" ${i===rankInd?'selected':''}>${D.meta[i]?D.meta[i].nome:i}</option>`).join('');

  let vs=D.municipios.map(m=>({m,v:m.i[rankInd]})).filter(x=>x.v!=null);
  vs.sort((a,b)=>rankDir==='top'?b.v-a.v:a.v-b.v);
  document.getElementById('rk-mun').innerHTML=vs.slice(0,10).map((x,i)=>`
    <div class="rk-item" onclick="selecionarPorChave('${nrm(x.m.m)}_${nrm(x.m.u)}')">
      <span class="rk-pos">${i+1}</span>
      <span class="rk-nm">${x.m.m} <span class="rk-uf">${x.m.u}</span></span>
      <span class="rk-v">${fmt(x.v)}</span>
    </div>`).join('');

  const uf={};
  for(const m of D.municipios){const v=m.i[rankInd];if(v!=null){if(!uf[m.u])uf[m.u]=[];uf[m.u].push(v);}}
  let estVs=Object.entries(uf).map(([u,arr])=>({u,v:arr.reduce((a,b)=>a+b,0)/arr.length}));
  estVs.sort((a,b)=>rankDir==='top'?b.v-a.v:a.v-b.v);
  document.getElementById('rk-est').innerHTML=estVs.slice(0,10).map((x,i)=>`
    <div class="rk-item">
      <span class="rk-pos">${i+1}</span>
      <span class="rk-nm">${x.u}</span>
      <span class="rk-v">${fmt(x.v)}</span>
    </div>`).join('');
}

// ─── TABS & UI ────────────────────────────────────────────────────────────────
function showTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  if(btn) btn.classList.add('on');
  ['mapa','explorar','rankings'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'flex':'none';
  });
  if(tab==='mapa'){
    document.getElementById('tab-mapa').style.flexDirection='column';
  }
  if(window.innerWidth<=768&&!document.body.classList.contains('desktop')) openPanel();
}

let panelOpen=false;
function togglePanel(){panelOpen=!panelOpen;document.getElementById('panel').classList.toggle('open',panelOpen);}
function openPanel(){panelOpen=true;document.getElementById('panel').classList.add('open');}
function closePanel(){panelOpen=false;document.getElementById('panel').classList.remove('open');}
function toggleDesktop(){
  document.body.classList.toggle('desktop');
  const on=document.body.classList.contains('desktop');
  document.getElementById('btn-desktop').classList.toggle('on',on);
  document.getElementById('btn-desktop').textContent=on?'📱 Mobile':'🖥 Desktop';
  setTimeout(()=>leaf&&leaf.invalidateSize(),350);
}

// ─── FORMAT ───────────────────────────────────────────────────────────────────
function fmt(v){
  if(v==null) return'—';
  if(Math.abs(v)>=1e6) return(v/1e6).toFixed(1)+'M';
  if(Math.abs(v)>=1e3) return(v/1e3).toFixed(1)+'k';
  if(Math.abs(v)>=100) return Math.round(v).toLocaleString('pt-BR');
  return parseFloat(v.toFixed(2)).toString();
}
function fmtPop(v){
  if(v>=1e6) return(v/1e6).toFixed(1)+'M';
  if(v>=1e3) return(v/1e3).toFixed(0)+'k';
  return Math.round(v).toString();
}
